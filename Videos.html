<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dernières actualités scientifiques</title>
  <style>
    body {
      background-color: #eaeaeb;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }
    h1 {
      text-align: center;
      font-family: courier;
      color: firebrick;
      font-size: clamp(18px, 4vw, 28px);
      margin-bottom: 4px;
    }
    h3 {
      font-family: Arial, sans-serif;
      text-align: center;
      color: firebrick;
      font-size: clamp(13px, 3vw, 18px);
      margin-top: 0;
    }
    .presentation {
      border: 2px solid firebrick;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      background: #f5f5f5;
    }
    .presentation h2 {
      font-family: Arial, sans-serif;
      font-size: clamp(14px, 3vw, 20px);
      color: #222;
      margin-top: 0;
      text-align: center;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding-top: 56.25%;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>

  <h1>Voici quelques videos interessantes à propos de science 🤓</h1>
  <h3>afin d'améliorer vos connaissance en science 🤪!</h3>

  <div class="presentation">
    <h2>Une video sur la naissance de la gravité 🤗 :</h2>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/lnEdBE7d_h0?si=H4J7ZC6r3HskTxkX" title="La naissance de la gravité" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>
  </div>

  <div class="presentation">
    <h2>Mesurer l'univers 📏 ?!</h2>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/FGwmAEMabm4?si=5YPQOkbrwNWTaw_n" title="Mesurer l'univers" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>
  </div>

  <div class="presentation">
    <h2>Vivre sur la lune, c'est possible 🌙 ?</h2>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/ognAG3ra2QI?si=OhhxNIwXIvdbCE-p" title="Vivre sur la lune" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>
  </div>

  <div class="presentation">
    <h2>Tout comprendre sur le systéme solaire 🪐 !</h2>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/NIyjtgvRcnQ?si=TTKdvXavr6dQf8Z_" title="Le système solaire" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>
  </div>

  <div class="presentation">
    <h2>Comment est né notre univers 🌍 ?</h2>
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/EJPSoLKE_RM?si=gt_j03JpyFEYwPJg" title="La naissance de l'univers" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    </div>
  </div>

</body>
</html>
